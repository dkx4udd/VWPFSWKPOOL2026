<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voorspellen — WK Pool 2026</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700;800;900&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 48; }
    .ms-filled { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 48; }
    .host-city-pattern {
      background-image: radial-gradient(circle at 2px 2px, rgba(110, 36, 246, 0.05) 1px, transparent 0);
      background-size: 16px 16px;
    }
    .btn-gradient { background: linear-gradient(135deg, #6200eb, #4700b0); }
    .btn-gradient:hover { background: linear-gradient(135deg, #5400cc, #3d0094); }
    .btn-gradient:disabled { background: #e2e2e2; box-shadow: none; cursor: not-allowed; color: #7b7488; }
    .score-input { -moz-appearance: textfield; }
    .score-input::-webkit-outer-spin-button,
    .score-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .nav-active .material-symbols-outlined { font-variation-settings: 'FILL' 1, 'wght' 700, 'GRAD' 0, 'opsz' 48; color: #4700b0; }
    .nav-active span:last-child { color: #4700b0; font-weight: 700; }
    .filter-pill { transition: all 0.15s ease; }
    .filter-pill.active { background: #4700b0; color: #fff; }
    .filter-pill:not(.active) { background: #eeeeee; color: #494456; }
    .save-success { animation: pulse-green 0.4s ease; }
    @keyframes pulse-green { 0%,100% { opacity:1; } 50% { opacity:0.7; } }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            "surface-container-lowest": "#ffffff",
            "on-primary": "#ffffff",
            "surface-container-low": "#f3f3f4",
            "on-surface-variant": "#494456",
            "background": "#f9f9f9",
            "primary": "#4700b0",
            "outline-variant": "#cbc3d9",
            "secondary": "#006874",
            "surface-container": "#eeeeee",
            "on-surface": "#1a1c1c",
            "surface-container-high": "#e8e8e8",
            "outline": "#7b7488",
            "surface-container-highest": "#e2e2e2",
            "error": "#ba1a1a",
            "secondary-fixed-dim": "#45d8ed",
          },
          fontFamily: { sans: ["Lexend", "sans-serif"] },
        }
      }
    }
  </script>
</head>
<body class="bg-background text-on-surface font-sans min-h-screen host-city-pattern">

  <!-- Header -->
  <header class="flex justify-between items-center px-4 h-16 w-full z-50 bg-surface-container-lowest border-b border-outline-variant sticky top-0">
    <div class="flex items-center gap-2">
      <div class="bg-primary p-2 rounded-lg text-white">
        <span class="material-symbols-outlined ms-filled" style="font-size:22px">sports_soccer</span>
      </div>
      <div>
        <div class="text-[9px] font-bold tracking-[0.2em] text-primary uppercase">Voorspellen</div>
        <div class="text-base font-black text-on-surface leading-none">WK Pool 2026</div>
      </div>
    </div>
    <div id="progress-badge" class="bg-primary/10 text-primary text-xs font-bold px-3 py-1.5 rounded-full"></div>
  </header>

  <!-- Filter pills (sticky below header) -->
  <div class="sticky top-16 z-40 bg-background border-b border-outline-variant">
    <div class="flex gap-2 px-4 py-3 overflow-x-auto no-scrollbar max-w-2xl mx-auto">
      <button class="filter-pill active flex-shrink-0 text-xs font-bold px-4 py-2 rounded-full" onclick="setFilter('all', this)">Alles</button>
      <button class="filter-pill flex-shrink-0 text-xs font-bold px-4 py-2 rounded-full" onclick="setFilter('group', this)">Groepsfase</button>
      <button class="filter-pill flex-shrink-0 text-xs font-bold px-4 py-2 rounded-full" onclick="setFilter('round_of_32', this)">R32</button>
      <button class="filter-pill flex-shrink-0 text-xs font-bold px-4 py-2 rounded-full" onclick="setFilter('round_of_16', this)">R16</button>
      <button class="filter-pill flex-shrink-0 text-xs font-bold px-4 py-2 rounded-full" onclick="setFilter('quarter_final', this)">KF</button>
      <button class="filter-pill flex-shrink-0 text-xs font-bold px-4 py-2 rounded-full" onclick="setFilter('semi_final', this)">HF</button>
      <button class="filter-pill flex-shrink-0 text-xs font-bold px-4 py-2 rounded-full" onclick="setFilter('final', this)">Finale</button>
    </div>
  </div>

  <!-- Bonus predictions banner -->
  <div id="bonus-section" class="max-w-2xl mx-auto px-4 pt-4">
    <div class="bg-gradient-to-r from-amber-50 to-yellow-50 border border-amber-200 rounded-2xl overflow-hidden">
      <div class="px-5 py-3 flex items-center justify-between">
        <div class="flex items-center gap-2">
          <span class="material-symbols-outlined ms-filled text-amber-500" style="font-size:20px">emoji_events</span>
          <span class="text-sm font-bold text-amber-800">Bonus-voorspellingen</span>
          <span id="bonus-deadline-badge" class="text-[10px] font-bold bg-amber-200 text-amber-800 px-2 py-0.5 rounded-full"></span>
        </div>
        <button onclick="toggleBonus()" id="bonus-toggle-btn" class="text-amber-700 hover:text-amber-900 transition-colors">
          <span class="material-symbols-outlined" id="bonus-toggle-icon" style="font-size:20px">expand_more</span>
        </button>
      </div>
      <div id="bonus-panel" class="hidden px-5 pb-4 space-y-4">
        <div id="bonus-error" class="hidden text-xs text-error bg-[#ffdad6] rounded-xl px-3 py-2"></div>
        <!-- Champion -->
        <div>
          <label class="text-xs font-bold tracking-widest text-amber-700 uppercase block mb-1">🏆 WK Kampioen (+20 punten)</label>
          <div class="flex gap-2">
            <select id="bonus-champion-select" class="flex-1 bg-white border border-amber-200 rounded-xl px-3 py-2.5 text-sm text-on-surface focus:outline-none focus:border-amber-400 transition-colors">
              <option value="">— Kies een land —</option>
            </select>
            <button onclick="saveChampion()" id="bonus-champion-btn" class="text-xs font-bold bg-amber-400 hover:bg-amber-500 text-amber-900 px-4 py-2 rounded-xl transition-colors active:scale-[0.98] disabled:opacity-50">
              Opslaan
            </button>
          </div>
          <div id="bonus-champion-saved" class="hidden mt-1 text-xs text-secondary font-semibold"></div>
        </div>
        <!-- Top scorer -->
        <div>
          <label class="text-xs font-bold tracking-widest text-amber-700 uppercase block mb-1">👟 Topscorer (+15 punten)</label>
          <div class="flex gap-2">
            <input id="bonus-topscorer-input" type="text" placeholder="Naam van de speler..." maxlength="100"
              class="flex-1 bg-white border border-amber-200 rounded-xl px-3 py-2.5 text-sm text-on-surface focus:outline-none focus:border-amber-400 transition-colors placeholder:text-outline">
            <button onclick="saveTopScorer()" id="bonus-topscorer-btn" class="text-xs font-bold bg-amber-400 hover:bg-amber-500 text-amber-900 px-4 py-2 rounded-xl transition-colors active:scale-[0.98] disabled:opacity-50">
              Opslaan
            </button>
          </div>
          <div id="bonus-topscorer-saved" class="hidden mt-1 text-xs text-secondary font-semibold"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Main -->
  <main id="match-list" class="px-4 pt-4 pb-24 max-w-2xl mx-auto space-y-6">
    <!-- Skeleton -->
    <div class="space-y-3 animate-pulse">
      <div class="h-6 bg-surface-container-highest rounded w-1/3"></div>
      <div class="h-28 bg-surface-container-highest rounded-2xl"></div>
      <div class="h-28 bg-surface-container-highest rounded-2xl"></div>
      <div class="h-28 bg-surface-container-highest rounded-2xl"></div>
    </div>
  </main>

  <!-- Bottom Nav -->
  <nav class="fixed bottom-0 left-0 right-0 bg-surface-container-lowest border-t border-outline-variant z-50">
    <div class="flex justify-around items-center h-16 max-w-2xl mx-auto">
      <a href="index.html" class="flex flex-col items-center gap-0.5 px-3 py-2 rounded-xl text-on-surface-variant hover:bg-surface-container transition-colors">
        <span class="material-symbols-outlined" style="font-size:22px">home</span>
        <span class="text-[10px] font-medium">Home</span>
      </a>
      <a href="predict.html" class="flex flex-col items-center gap-0.5 px-3 py-2 rounded-xl nav-active">
        <span class="material-symbols-outlined" style="font-size:22px">sports_soccer</span>
        <span class="text-[10px] font-medium">Voorspellen</span>
      </a>
      <a href="ranking.html" class="flex flex-col items-center gap-0.5 px-3 py-2 rounded-xl text-on-surface-variant hover:bg-surface-container transition-colors">
        <span class="material-symbols-outlined" style="font-size:22px">leaderboard</span>
        <span class="text-[10px] font-medium">Ranglijst</span>
      </a>
      <a href="spelregels.html" class="flex flex-col items-center gap-0.5 px-3 py-2 rounded-xl text-on-surface-variant hover:bg-surface-container transition-colors">
        <span class="material-symbols-outlined" style="font-size:22px">gavel</span>
        <span class="text-[10px] font-medium">Spelregels</span>
      </a>
    </div>
  </nav>

  <script>
    const API_BASE = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
      ? 'http://localhost:3003/api/v1'
      : `${window.location.protocol}//${window.location.host}/api/v1`;

    const PHASE_LABELS = {
      group: 'Groepsfase', round_of_32: 'Ronde van 32', round_of_16: 'Achtste finales',
      quarter_final: 'Kwartfinales', semi_final: 'Halve finales',
      third_place: 'Troostfinale', final: 'Finale'
    };

    if (!localStorage.getItem('wk_token')) window.location.href = 'login.html';

    let allMatches = [], predMap = {}, statsMap = {}, aiMap = {}, boosterMap = {}, currentFilter = 'all', resolvedTeams = {}, autoSaveTimers = {};

    async function apiFetch(path, opts = {}) {
      const token = localStorage.getItem('wk_token');
      const res = await fetch(API_BASE + path, {
        ...opts,
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}`, ...(opts.headers || {}) },
      });
      if (res.status === 401) { ['wk_token','wk_refresh_token','wk_user'].forEach(k => localStorage.removeItem(k)); window.location.href = 'login.html'; }
      return res;
    }

    function teamName(match, side) {
      const team = match[`${side}Team`];
      if (team) return team.nameNl || team.nameEn;
      const ph = match[`${side}TeamPlaceholder`];
      if (ph && resolvedTeams[ph]) return resolvedTeams[ph].team.nameNl || resolvedTeams[ph].team.nameEn;
      return ph || '?';
    }

    function flagUrl(match, side) {
      const team = match[`${side}Team`];
      if (team?.isoCode) return `https://flagcdn.com/w40/${team.isoCode.toLowerCase()}.png`;
      const ph = match[`${side}TeamPlaceholder`];
      if (ph && resolvedTeams[ph]?.team?.isoCode)
        return `https://flagcdn.com/w40/${resolvedTeams[ph].team.isoCode.toLowerCase()}.png`;
      return null;
    }

    function isResolved(match, side) {
      const ph = match[`${side}TeamPlaceholder`];
      return ph && resolvedTeams[ph];
    }

    // ── Bracket resolution ─────────────────────────────────────────────────
    function calculateGroupStandings(groupMatches) {
      const teams = {};
      for (const match of groupMatches) {
        const homeId = match.homeTeam?.id, awayId = match.awayTeam?.id;
        if (!homeId || !awayId) continue;
        if (!teams[homeId]) teams[homeId] = { team: match.homeTeam, p: 0, gf: 0, ga: 0, gd: 0, pts: 0 };
        if (!teams[awayId]) teams[awayId] = { team: match.awayTeam, p: 0, gf: 0, ga: 0, gd: 0, pts: 0 };
        const pred = predMap[match.id];
        if (!pred) continue;
        const h = pred.homeScore, a = pred.awayScore;
        teams[homeId].p++; teams[homeId].gf += h; teams[homeId].ga += a; teams[homeId].gd += h - a;
        teams[awayId].p++; teams[awayId].gf += a; teams[awayId].ga += h; teams[awayId].gd += a - h;
        if (h > a) teams[homeId].pts += 3;
        else if (h === a) { teams[homeId].pts++; teams[awayId].pts++; }
        else teams[awayId].pts += 3;
      }
      return Object.values(teams).sort((a, b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf);
    }

    function buildResolvedTeams() {
      const buckets = {};
      for (const m of allMatches) {
        if (m.phase === 'group' && m.group) {
          if (!buckets[m.group]) buckets[m.group] = [];
          buckets[m.group].push(m);
        }
      }
      const resolved = {}, thirds = [];
      for (const [grp, matches] of Object.entries(buckets)) {
        // Groep pas resolven als ALLE 6 wedstrijden zijn voorspeld
        if (matches.some(m => !predMap[m.id])) continue;
        const s = calculateGroupStandings(matches);
        if (s[0]) resolved[`1${grp}`] = s[0];
        if (s[1]) resolved[`2${grp}`] = s[1];
        if (s[2]) thirds.push({ ...s[2], group: grp });
      }
      thirds.sort((a, b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf);
      thirds.slice(0, 8).forEach((t, i) => { resolved[`3e plaats ${i + 1}`] = t; });
      resolvedTeams = resolved;
    }

    function updateKnockoutDisplays() {
      for (const match of allMatches) {
        if (match.phase === 'group') continue;
        for (const side of ['home', 'away']) {
          const ph = match[`${side}TeamPlaceholder`];
          if (!ph) continue;
          const nameEl = document.getElementById(`tn-${side}-${match.id}`);
          const flagEl = document.getElementById(`tf-${side}-${match.id}`);
          if (!nameEl || !flagEl) continue;
          const resolved = resolvedTeams[ph];
          if (resolved) {
            const name = resolved.team.nameNl || resolved.team.nameEn;
            const iso = resolved.team.isoCode?.toLowerCase();
            nameEl.textContent = name;
            nameEl.classList.add('text-primary');
            flagEl.innerHTML = iso
              ? `<img src="https://flagcdn.com/w40/${iso}.png" class="w-10 h-7 object-cover rounded shadow-sm opacity-90" alt="${name}">`
              : `<span class="material-symbols-outlined text-outline" style="font-size:24px">flag</span>`;
          } else {
            nameEl.textContent = ph;
            nameEl.classList.remove('text-primary');
            flagEl.innerHTML = `<span class="material-symbols-outlined text-outline/40" style="font-size:24px">flag</span>`;
          }
        }
      }
    }

    // Revision window opens when no group matches are scheduled anymore
    function isRevisionWindowOpen() {
      const groupMatches = allMatches.filter(m => m.phase === 'group');
      return groupMatches.length > 0 && !groupMatches.some(m => m.status === 'scheduled');
    }

    function isRevisionMatch(match) {
      return match.phase !== 'group' && isRevisionWindowOpen();
    }

    function isLocked(match) {
      if (match.status !== 'scheduled') return true;
      if (isRevisionMatch(match)) {
        // In revision window: locked 1 minute before kickoff
        return new Date() >= new Date(new Date(match.scheduledAt).getTime() - 60 * 1000);
      }
      return new Date() >= new Date(match.scheduledAt);
    }

    function setFilter(phase, btn) {
      currentFilter = phase;
      document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      renderList();
    }

    function formatMatchDate(dt) {
      return new Date(dt).toLocaleDateString('nl-NL', { weekday: 'short', day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
    }

    function groupByPhaseAndDate(matches) {
      const groups = {};
      for (const m of matches) {
        const key = m.phase;
        if (!groups[key]) groups[key] = [];
        groups[key].push(m);
      }
      return groups;
    }

    function renderList() {
      const filtered = currentFilter === 'all' ? allMatches : allMatches.filter(m => m.phase === currentFilter);
      const done = Object.keys(predMap).length;
      document.getElementById('progress-badge').textContent = `${done} / ${allMatches.length}`;

      if (filtered.length === 0) {
        document.getElementById('match-list').innerHTML = `
          <div class="text-center py-12">
            <span class="material-symbols-outlined text-outline" style="font-size:48px">sports_soccer</span>
            <p class="text-on-surface-variant mt-2">Geen wedstrijden gevonden</p>
          </div>`;
        return;
      }

      const grouped = groupByPhaseAndDate(filtered);
      const phaseOrder = ['group', 'round_of_32', 'round_of_16', 'quarter_final', 'semi_final', 'third_place', 'final'];
      const html = phaseOrder.filter(p => grouped[p]).map(phase => {
        const matches = grouped[phase];
        if (phase === 'group') {
          const byGroup = {};
          for (const m of matches) {
            if (!byGroup[m.group]) byGroup[m.group] = [];
            byGroup[m.group].push(m);
          }
          const groupOrder = ['A','B','C','D','E','F','G','H','I','J','K','L'];
          const subSections = groupOrder.filter(g => byGroup[g]).map(g => {
            const sorted = byGroup[g].slice().sort((a,b) => new Date(a.scheduledAt) - new Date(b.scheduledAt));
            return `
              <div class="mb-6">
                <h4 class="text-xs font-bold tracking-widest uppercase mb-3 flex items-center gap-2" style="color:var(--md-sys-color-primary)">
                  <span class="inline-flex items-center justify-center w-5 h-5 rounded-full text-[11px] font-black" style="background:var(--md-sys-color-primary);color:var(--md-sys-color-on-primary)">${g}</span>
                  Groep ${g}
                </h4>
                <div class="space-y-3">${sorted.map(m => renderMatchCard(m)).join('')}</div>
              </div>`;
          }).join('');
          return `
            <section>
              <h3 class="text-xs font-bold tracking-widest text-on-surface-variant uppercase mb-4 flex items-center gap-2">
                <span class="w-1 h-4 bg-primary rounded-full inline-block"></span>
                ${PHASE_LABELS[phase]}
              </h3>
              ${subSections}
            </section>`;
        }
        const matchCards = matches.map(m => renderMatchCard(m)).join('');
        return `
          <section>
            <h3 class="text-xs font-bold tracking-widest text-on-surface-variant uppercase mb-3 flex items-center gap-2">
              <span class="w-1 h-4 bg-primary rounded-full inline-block"></span>
              ${PHASE_LABELS[phase]}
            </h3>
            <div class="space-y-3">${matchCards}</div>
          </section>`;
      }).join('');

      document.getElementById('match-list').innerHTML = html;
    }

    function renderMatchCard(match) {
      const locked = isLocked(match);
      const pred = predMap[match.id];
      const homeName = teamName(match, 'home');
      const awayName = teamName(match, 'away');
      const homeFlag = flagUrl(match, 'home');
      const awayFlag = flagUrl(match, 'away');

      const homeImgInner = homeFlag
        ? `<img src="${homeFlag}" alt="${homeName}" class="w-10 h-7 object-cover rounded shadow-sm" onerror="this.outerHTML='<span class=\\'material-symbols-outlined text-outline\\' style=\\'font-size:24px\\'>flag</span>'">`
        : `<span class="material-symbols-outlined text-outline" style="font-size:24px">flag</span>`;
      const awayImgInner = awayFlag
        ? `<img src="${awayFlag}" alt="${awayName}" class="w-10 h-7 object-cover rounded shadow-sm" onerror="this.outerHTML='<span class=\\'material-symbols-outlined text-outline\\' style=\\'font-size:24px\\'>flag</span>'">`
        : `<span class="material-symbols-outlined text-outline" style="font-size:24px">flag</span>`;
      const homeImg = `<div id="tf-home-${match.id}">${homeImgInner}</div>`;
      const awayImg = `<div id="tf-away-${match.id}">${awayImgInner}</div>`;

      const isRevision = isRevisionMatch(match);
      const statusBadge = locked
        ? (match.status === 'live'
          ? `<span class="absolute top-2 right-2 flex items-center gap-1 bg-error/10 text-error text-[10px] font-bold px-2 py-0.5 rounded-full"><span class="w-1.5 h-1.5 bg-error rounded-full animate-pulse inline-block"></span>LIVE</span>`
          : match.status === 'finished'
            ? `<span class="absolute top-2 right-2 text-[10px] font-bold text-outline bg-surface-container px-2 py-0.5 rounded-full">GESPEELD</span>`
            : `<span class="absolute top-2 right-2 text-[10px] font-bold text-outline bg-surface-container px-2 py-0.5 rounded-full">VERGRENDELD</span>`)
        : pred?.isRevised
          ? `<span class="absolute top-2 right-2 text-[10px] font-bold text-amber-700 bg-amber-100 px-2 py-0.5 rounded-full">⚠ AANGEPAST · 50%</span>`
          : pred
            ? `<span class="absolute top-2 right-2 text-[10px] font-bold text-secondary bg-secondary/10 px-2 py-0.5 rounded-full">OPGESLAGEN</span>`
            : '';

      const homeVal = pred ? pred.homeScore : '';
      const awayVal = pred ? pred.awayScore : '';

      const inputOrScore = match.status === 'finished' && match.homeScore !== null
        ? `<div class="flex items-center gap-2">
            <span class="text-2xl font-black text-on-surface">${match.homeScore}</span>
            <span class="text-on-surface-variant font-bold">–</span>
            <span class="text-2xl font-black text-on-surface">${match.awayScore}</span>
           </div>`
        : `<div class="flex items-center gap-2">
            <input type="number" min="0" max="99" value="${homeVal}" ${locked ? 'disabled' : ''}
              class="score-input w-12 h-12 text-center text-xl font-black rounded-xl border-2 ${locked ? 'bg-surface-container-highest border-outline-variant text-outline cursor-not-allowed' : 'bg-surface-container-low border-outline-variant focus:border-primary focus:ring-0 text-on-surface'} outline-none transition-colors"
              data-match="${match.id}" data-side="home" onblur="scheduleAutoSave('${match.id}')">
            <span class="text-on-surface-variant font-bold text-lg">–</span>
            <input type="number" min="0" max="99" value="${awayVal}" ${locked ? 'disabled' : ''}
              class="score-input w-12 h-12 text-center text-xl font-black rounded-xl border-2 ${locked ? 'bg-surface-container-highest border-outline-variant text-outline cursor-not-allowed' : 'bg-surface-container-low border-outline-variant focus:border-primary focus:ring-0 text-on-surface'} outline-none transition-colors"
              data-match="${match.id}" data-side="away" onblur="scheduleAutoSave('${match.id}')">
           </div>`;

      const pointsBadge = pred && pred.points !== null
        ? `<span class="text-xs font-bold ${pred.points === 10 ? 'text-primary' : pred.points >= 3 ? 'text-secondary' : 'text-outline'}">${pred.points} pt${pred.points !== 1 ? 's' : ''}</span>`
        : '';

      const saveStatus = locked ? '' : `<div id="save-status-${match.id}" class="text-xs font-semibold text-secondary min-w-[56px] text-center">${pred ? '✓' : ''}</div>`;

      // ── Booster ──────────────────────────────────────────────────────────
      const isGroupMatch = match.phase === 'group' && match.group;
      const boosterActive  = boosterMap[match.group] === match.id;
      const boosterElsewhere = isGroupMatch && boosterMap[match.group] && !boosterActive;
      const boosterSection = isGroupMatch ? (() => {
        const goalSvg = `<svg width="17" height="13" viewBox="0 0 17 13" fill="none" xmlns="http://www.w3.org/2000/svg" class="flex-shrink-0">
          <rect x="0" y="0" width="1.5" height="13" fill="currentColor" opacity="0.9" rx="0.5"/>
          <rect x="15.5" y="0" width="1.5" height="13" fill="currentColor" opacity="0.9" rx="0.5"/>
          <rect x="0" y="0" width="17" height="1.5" fill="currentColor" opacity="0.9" rx="0.5"/>
          <line x1="1.5" y1="1.5" x2="15.5" y2="13" stroke="currentColor" stroke-width="0.6" opacity="0.3"/>
          <line x1="15.5" y1="1.5" x2="1.5" y2="13" stroke="currentColor" stroke-width="0.6" opacity="0.3"/>
          <line x1="8.5" y1="1.5" x2="8.5" y2="13" stroke="currentColor" stroke-width="0.6" opacity="0.3"/>
          <circle cx="8.5" cy="8.5" r="3.2" fill="currentColor"/>
          <path d="M8.5 6.2L10 8.7H7L8.5 6.2Z" fill="white" opacity="0.7"/>
        </svg>`;
        if (locked) {
          if (boosterActive) return `
            <div class="mt-2 flex justify-center">
              <span class="inline-flex items-center gap-1.5 text-[10px] font-black px-3 py-1 rounded-full bg-orange-100 text-orange-700">
                ${goalSvg} BOOSTER ACTIEF &nbsp;×2
              </span>
            </div>`;
          return '';
        }
        if (boosterActive) return `
          <div class="mt-2 flex justify-center">
            <button onclick="toggleBooster('${match.id}','${match.group}')" id="boost-btn-${match.id}"
              class="inline-flex items-center gap-1.5 text-xs font-black px-4 py-1.5 rounded-full transition-all active:scale-95
                     text-white shadow-[0_2px_10px_rgba(234,88,12,0.4)]"
              style="background:linear-gradient(135deg,#f97316,#ea580c)">
              ${goalSvg} BOOSTER ACTIEF &nbsp;<span class="text-[13px] leading-none">×2</span>
            </button>
          </div>`;
        if (boosterElsewhere) return `
          <div class="mt-2 flex justify-center">
            <span class="inline-flex items-center gap-1.5 text-[10px] font-medium px-3 py-1 rounded-full bg-surface-container text-outline opacity-60">
              ${goalSvg} Booster al gebruikt in groep ${match.group}
            </span>
          </div>`;
        return `
          <div class="mt-2 flex justify-center">
            <button onclick="toggleBooster('${match.id}','${match.group}')" id="boost-btn-${match.id}"
              class="inline-flex items-center gap-1.5 text-[11px] font-bold px-4 py-1.5 rounded-full border-2 border-dashed transition-all active:scale-95
                     border-orange-300 text-orange-400 hover:border-orange-400 hover:text-orange-500 hover:bg-orange-50">
              ${goalSvg} Booster activeren &nbsp;<span class="font-black text-[12px]">×2</span>
            </button>
          </div>`;
      })() : '';

      const ai = aiMap[match.id];
      const aiBar = ai ? (() => {
        const bar = `
          <div class="flex rounded-full overflow-hidden h-1 mb-1.5">
            <div style="width:${ai.homePct}%;background:#6366f1" class="h-full"></div>
            <div style="width:${ai.drawPct}%;background:#a5b4fc" class="h-full"></div>
            <div style="width:${ai.awayPct}%;background:#818cf8" class="h-full"></div>
          </div>`;
        const labels = `
          <div class="flex items-center justify-between text-[10px] leading-tight">
            <span class="text-indigo-700 font-bold">${ai.homePct}% ${homeName}</span>
            <span class="flex items-center gap-1 text-indigo-400 font-semibold text-[9px]">
              <span class="text-[11px]">🤖</span> WKpoolAi
            </span>
            <span class="text-indigo-600 font-bold">${awayName} ${ai.awayPct}%</span>
          </div>
          ${ai.drawPct > 0 ? `<div class="text-center text-[9px] text-indigo-400 mt-0.5">gelijk ${ai.drawPct}%</div>` : ''}`;
        return `<div class="mt-2 pt-2 border-t border-indigo-100 bg-indigo-50/40 rounded-xl px-2 py-1.5">${bar}${labels}</div>`;
      })() : '';

      const st = statsMap[match.id];
      const statBar = (() => {
        const total = st?.total || 0;
        const bar = total > 0
          ? `<div class="flex rounded-full overflow-hidden h-1 mb-2">
              ${st.homePct > 0 ? `<div style="width:${st.homePct}%;background:var(--md-sys-color-primary)" class="h-full"></div>` : ''}
              ${st.drawPct > 0 ? `<div style="width:${st.drawPct}%;background:var(--md-sys-color-outline-variant)" class="h-full"></div>` : ''}
              ${st.awayPct > 0 ? `<div style="width:${st.awayPct}%;background:var(--md-sys-color-secondary)" class="h-full"></div>` : ''}
             </div>`
          : `<div class="rounded-full h-1 mb-2 bg-surface-container-high"></div>`;
        const labels = total > 0
          ? `<div class="flex items-start justify-between text-[10px] text-on-surface-variant leading-tight">
              <span><span class="font-bold" style="color:var(--md-sys-color-primary)">${st.homePct}%</span> ${homeName}</span>
              <span class="text-center text-outline px-1">${st.drawPct > 0 ? `gelijk ${st.drawPct}%` : ''}<br><span class="text-[9px]">${total} ingevuld</span></span>
              <span class="text-right">${awayName} <span class="font-bold" style="color:var(--md-sys-color-secondary)">${st.awayPct}%</span></span>
             </div>`
          : '';
        return `<div class="mt-3 pt-2.5 border-t border-outline-variant/30">${bar}${labels}</div>`;
      })();

      return `
        <article class="relative bg-surface-container-lowest rounded-2xl px-5 py-4 shadow-[0_2px_8px_rgba(71,0,176,0.06)] hover:shadow-[0_4px_12px_rgba(71,0,176,0.1)] transition-shadow">
          ${statusBadge}
          <div class="text-[10px] text-on-surface-variant mb-3 flex items-center gap-2">
            ${match.group ? `<span class="font-bold text-primary">Groep ${match.group}</span><span>·</span>` : ''}
            <span>${formatMatchDate(match.scheduledAt)}</span>
            ${match.city ? `<span>·</span><span>${match.city}</span>` : ''}
          </div>
          <div class="flex items-center justify-between gap-2">
            <div class="flex-1 flex flex-col items-center gap-1.5 min-w-0">
              ${homeImg}
              <span id="tn-home-${match.id}" class="text-xs font-semibold text-on-surface text-center leading-tight">${homeName}</span>
            </div>
            <div class="flex flex-col items-center gap-2">
              ${inputOrScore}
              <div class="flex items-center gap-2">
                ${pointsBadge}
                ${saveStatus}
              </div>
            </div>
            <div class="flex-1 flex flex-col items-center gap-1.5 min-w-0">
              ${awayImg}
              <span id="tn-away-${match.id}" class="text-xs font-semibold text-on-surface text-center leading-tight">${awayName}</span>
            </div>
          </div>
          <div id="msg-${match.id}" class="text-xs text-center mt-2 hidden"></div>
          ${boosterSection}
          ${statBar}
          ${aiBar}
          ${!locked && isRevision ? `
          <div class="mt-3 flex items-center gap-2 bg-amber-50 border border-amber-200 rounded-xl px-3 py-2">
            <span class="material-symbols-outlined text-amber-500 flex-shrink-0" style="font-size:16px">warning</span>
            <span class="text-[11px] text-amber-800">Je kunt aanpassen tot 1 minuut voor aftrap, maar ontvangt dan maximaal <strong>50% van de punten</strong> voor deze wedstrijd.</span>
          </div>` : ''}
        </article>`;
    }

    function scheduleAutoSave(matchId) {
      clearTimeout(autoSaveTimers[matchId]);
      autoSaveTimers[matchId] = setTimeout(() => {
        const homeInput = document.querySelector(`input[data-match="${matchId}"][data-side="home"]`);
        const awayInput = document.querySelector(`input[data-match="${matchId}"][data-side="away"]`);
        if (!homeInput || !awayInput) return;
        if (homeInput.value === '' || awayInput.value === '') return;
        const h = parseInt(homeInput.value), a = parseInt(awayInput.value);
        if (isNaN(h) || isNaN(a)) return;
        const pred = predMap[matchId];
        if (pred && pred.homeScore === h && pred.awayScore === a) return;
        const match = allMatches.find(m => m.id === matchId);
        const useRevise = match && isRevisionMatch(match);
        savePrediction(matchId, useRevise);
      }, 400);
    }

    async function savePrediction(matchId, isRevise = false) {
      const homeInput = document.querySelector(`input[data-match="${matchId}"][data-side="home"]`);
      const awayInput = document.querySelector(`input[data-match="${matchId}"][data-side="away"]`);
      const statusEl = document.getElementById(`save-status-${matchId}`);
      const msg = document.getElementById(`msg-${matchId}`);

      if (!homeInput || !awayInput) return;
      const homeScore = parseInt(homeInput.value);
      const awayScore = parseInt(awayInput.value);

      if (isNaN(homeScore) || isNaN(awayScore) || homeScore < 0 || awayScore < 0) {
        if (msg) { msg.textContent = 'Vul geldige scores in (0–99)'; msg.className = 'text-xs text-center mt-2 text-error'; msg.classList.remove('hidden'); }
        return;
      }

      if (statusEl) { statusEl.textContent = '…'; statusEl.className = 'text-xs font-semibold text-outline min-w-[56px] text-center'; }

      const endpoint = isRevise
        ? `/predictions/match/${matchId}/revise`
        : `/predictions/match/${matchId}`;

      try {
        const res = await apiFetch(endpoint, {
          method: 'POST',
          body: JSON.stringify({ homeScore, awayScore }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || 'Opslaan mislukt');

        predMap[matchId] = { ...data, homeScore, awayScore };

        if (statusEl) {
          statusEl.textContent = isRevise ? '⚠ 50%' : '✓';
          statusEl.className = `text-xs font-semibold min-w-[56px] text-center ${isRevise ? 'text-amber-600' : 'text-secondary'}`;
        }
        if (msg) msg.classList.add('hidden');

        // Update badge in top-right of card if revised
        if (isRevise) {
          const article = homeInput.closest('article');
          const badge = article?.querySelector('[class*="absolute top-2 right-2"]');
          if (badge) { badge.textContent = '⚠ AANGEPAST · 50%'; badge.className = 'absolute top-2 right-2 text-[10px] font-bold text-amber-700 bg-amber-100 px-2 py-0.5 rounded-full'; }
        }

        document.getElementById('progress-badge').textContent = `${Object.keys(predMap).length} / ${allMatches.length}`;

        const savedMatch = allMatches.find(m => m.id === matchId);
        if (savedMatch && savedMatch.phase === 'group') {
          buildResolvedTeams();
          updateKnockoutDisplays();
        }
      } catch (err) {
        if (statusEl) { statusEl.textContent = '✗'; statusEl.className = 'text-xs font-semibold text-error min-w-[56px] text-center'; }
        if (msg) { msg.textContent = err.message; msg.className = 'text-xs text-center mt-2 text-error'; msg.classList.remove('hidden'); }
      }
    }

    // ── Bonus predictions ─────────────────────────────────────────────────
    const TOURNAMENT_START = new Date('2026-06-11T00:00:00Z');
    let bonusLocked = false;

    function toggleBonus() {
      const panel = document.getElementById('bonus-panel');
      const icon = document.getElementById('bonus-toggle-icon');
      const hidden = panel.classList.contains('hidden');
      panel.classList.toggle('hidden', !hidden);
      icon.textContent = hidden ? 'expand_less' : 'expand_more';
    }

    function showBonusError(msg) {
      const el = document.getElementById('bonus-error');
      el.textContent = msg; el.classList.remove('hidden');
      setTimeout(() => el.classList.add('hidden'), 4000);
    }

    async function loadBonusSection() {
      bonusLocked = new Date() >= TOURNAMENT_START;
      const badge = document.getElementById('bonus-deadline-badge');
      badge.textContent = bonusLocked ? 'GESLOTEN' : 'Deadline: 11 jun 2026';

      // Load teams for champion dropdown
      const teamsRes = await apiFetch('/matches?phase=group');
      if (teamsRes.ok) {
        const matches = await teamsRes.json();
        const teamSet = new Map();
        matches.forEach(m => {
          if (m.homeTeam) teamSet.set(m.homeTeam.id, m.homeTeam.nameNl);
          if (m.awayTeam) teamSet.set(m.awayTeam.id, m.awayTeam.nameNl);
        });
        const sel = document.getElementById('bonus-champion-select');
        [...teamSet.entries()].sort((a,b) => a[1].localeCompare(b[1])).forEach(([id, name]) => {
          const opt = document.createElement('option');
          opt.value = id; opt.textContent = name;
          sel.appendChild(opt);
        });
        if (bonusLocked) sel.disabled = true;
      }

      // Load existing bonus predictions
      const bonusRes = await apiFetch('/bonus-predictions/my');
      if (bonusRes.ok) {
        const bonusPreds = await bonusRes.json();
        const champion = bonusPreds.find(b => b.type === 'champion');
        const topScorer = bonusPreds.find(b => b.type === 'top_scorer');
        if (champion?.teamId) {
          document.getElementById('bonus-champion-select').value = champion.teamId;
          document.getElementById('bonus-champion-saved').textContent = `✓ Opgeslagen: ${champion.team?.nameNl || ''}${champion.points !== null ? ` · ${champion.points} punten gescoord` : ''}`;
          document.getElementById('bonus-champion-saved').classList.remove('hidden');
        }
        if (topScorer?.playerName) {
          document.getElementById('bonus-topscorer-input').value = topScorer.playerName;
          document.getElementById('bonus-topscorer-saved').textContent = `✓ Opgeslagen: ${topScorer.playerName}${topScorer.points !== null ? ` · ${topScorer.points} punten gescoord` : ''}`;
          document.getElementById('bonus-topscorer-saved').classList.remove('hidden');
        }
        if (bonusLocked) {
          document.getElementById('bonus-topscorer-input').disabled = true;
          document.getElementById('bonus-champion-btn').disabled = true;
          document.getElementById('bonus-topscorer-btn').disabled = true;
        }
      }

      // Auto-open if not locked and incomplete
      if (!bonusLocked) {
        const bonusRes2 = await apiFetch('/bonus-predictions/my');
        if (bonusRes2.ok) {
          const bp = await bonusRes2.json();
          if (bp.length < 2) toggleBonus();
        }
      }
    }

    async function saveChampion() {
      const teamId = document.getElementById('bonus-champion-select').value;
      if (!teamId) return showBonusError('Selecteer een land');
      const btn = document.getElementById('bonus-champion-btn');
      btn.disabled = true;
      try {
        const res = await apiFetch('/bonus-predictions/champion', {
          method: 'POST', body: JSON.stringify({ teamId }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || 'Opslaan mislukt');
        const savedEl = document.getElementById('bonus-champion-saved');
        savedEl.textContent = `✓ Opgeslagen: ${data.team?.nameNl || ''}`;
        savedEl.classList.remove('hidden');
      } catch (err) {
        showBonusError(err.message);
        btn.disabled = false;
      }
    }

    async function saveTopScorer() {
      const playerName = document.getElementById('bonus-topscorer-input').value.trim();
      if (!playerName) return showBonusError('Vul een spelernaam in');
      const btn = document.getElementById('bonus-topscorer-btn');
      btn.disabled = true;
      try {
        const res = await apiFetch('/bonus-predictions/top-scorer', {
          method: 'POST', body: JSON.stringify({ playerName }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || 'Opslaan mislukt');
        const savedEl = document.getElementById('bonus-topscorer-saved');
        savedEl.textContent = `✓ Opgeslagen: ${data.playerName}`;
        savedEl.classList.remove('hidden');
      } catch (err) {
        showBonusError(err.message);
        btn.disabled = false;
      }
    }

    // ── Booster ────────────────────────────────────────────────────────────
    async function toggleBooster(matchId, group) {
      const btn = document.getElementById(`boost-btn-${matchId}`);
      if (btn) btn.disabled = true;
      try {
        const res = await apiFetch(`/predictions/match/${matchId}/boost`, { method: 'POST' });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || 'Mislukt');
        if (data.active) {
          boosterMap[group] = matchId;
        } else {
          delete boosterMap[group];
        }
        renderList();
      } catch (err) {
        if (btn) btn.disabled = false;
        alert('Booster kon niet worden ingesteld: ' + err.message);
      }
    }

    // ── Main init ──────────────────────────────────────────────────────────
    async function init() {
      try {
        const [matchRes, predRes, statsRes, aiRes, boosterRes] = await Promise.all([
          apiFetch('/matches'),
          apiFetch('/predictions/my'),
          apiFetch('/predictions/stats'),
          apiFetch('/predictions/ai'),
          apiFetch('/predictions/boosters'),
        ]);

        allMatches = matchRes.ok ? await matchRes.json() : [];
        const predictions = predRes.ok ? await predRes.json() : [];
        predMap = {};
        predictions.forEach(p => { predMap[p.matchId || p.match?.id] = p; });
        const statsArr = statsRes.ok ? await statsRes.json() : [];
        statsMap = {};
        statsArr.forEach(s => { statsMap[s.matchId] = s; });
        const aiArr = aiRes.ok ? await aiRes.json() : [];
        aiMap = {};
        aiArr.forEach(a => { aiMap[a.matchId] = a; });
        const boosterArr = boosterRes.ok ? await boosterRes.json() : [];
        boosterMap = {};
        // boosterMap: groepsletter → matchId
        boosterArr.forEach(b => { boosterMap[b.matchGroup] = b.matchId; });

        renderList();
        buildResolvedTeams();
        updateKnockoutDisplays();
        loadBonusSection();
      } catch (err) {
        document.getElementById('match-list').innerHTML = `
          <div class="text-center py-12">
            <span class="material-symbols-outlined text-error" style="font-size:40px">error</span>
            <p class="text-on-surface-variant mt-2">Fout bij laden: ${err.message}</p>
            <button onclick="init()" class="mt-4 text-primary font-semibold text-sm">Opnieuw proberen</button>
          </div>`;
      }
    }

    init();
  </script>
</body>
</html>
