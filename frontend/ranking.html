<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ranglijst — WK Pool 2026</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700;800;900&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 48; }
    .ms-filled { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 48; }
    .host-city-pattern {
      background-image: radial-gradient(circle at 2px 2px, rgba(110, 36, 246, 0.05) 1px, transparent 0);
      background-size: 16px 16px;
    }
    .btn-gradient { background: linear-gradient(135deg, #6200eb, #4700b0); }
    .nav-active .material-symbols-outlined { font-variation-settings: 'FILL' 1, 'wght' 700, 'GRAD' 0, 'opsz' 48; color: #4700b0; }
    .nav-active span:last-child { color: #4700b0; font-weight: 700; }
    .gold { background: linear-gradient(135deg, #f59e0b22, #fde68a33); border-left: 3px solid #f59e0b; }
    .silver { background: linear-gradient(135deg, #9ca3af22, #d1d5db33); border-left: 3px solid #9ca3af; }
    .bronze { background: linear-gradient(135deg, #d9770622, #fed7aa33); border-left: 3px solid #d97706; }
    .my-row { background: #4700b010; border-left: 3px solid #4700b0; }
    .dropdown-panel { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
    .dropdown-panel.open { max-height: 2000px; }
    .chevron { transition: transform 0.25s ease; }
    .chevron.open { transform: rotate(180deg); }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            "surface-container-lowest": "#ffffff",
            "on-primary": "#ffffff",
            "surface-container-low": "#f3f3f4",
            "on-surface-variant": "#494456",
            "background": "#f9f9f9",
            "primary": "#4700b0",
            "outline-variant": "#cbc3d9",
            "secondary": "#006874",
            "surface-container": "#eeeeee",
            "on-surface": "#1a1c1c",
            "surface-container-high": "#e8e8e8",
            "outline": "#7b7488",
            "surface-container-highest": "#e2e2e2",
          },
          fontFamily: { sans: ["Lexend", "sans-serif"] },
        }
      }
    }
  </script>
</head>
<body class="bg-background text-on-surface font-sans min-h-screen host-city-pattern">

  <!-- Header -->
  <header class="flex justify-between items-center px-4 h-16 w-full z-50 bg-surface-container-lowest border-b border-outline-variant sticky top-0">
    <div class="flex items-center gap-2">
      <div class="bg-primary p-2 rounded-lg text-white">
        <span class="material-symbols-outlined ms-filled" style="font-size:22px">leaderboard</span>
      </div>
      <div>
        <div class="text-[9px] font-bold tracking-[0.2em] text-primary uppercase">Klassement</div>
        <div class="text-base font-black text-on-surface leading-none">Ranglijst</div>
      </div>
    </div>
    <button onclick="loadRanking()" class="flex items-center gap-1 text-xs font-semibold text-primary px-3 py-2 rounded-xl hover:bg-surface-container transition-colors">
      <span class="material-symbols-outlined" style="font-size:18px">refresh</span>
    </button>
  </header>

  <!-- Main -->
  <main class="px-4 pt-4 pb-24 max-w-2xl mx-auto">
    <div id="ranking-content">
      <!-- Skeleton -->
      <div class="space-y-3 animate-pulse">
        <div class="h-36 bg-surface-container-highest rounded-2xl"></div>
        <div class="h-12 bg-surface-container-highest rounded-2xl"></div>
        <div class="h-12 bg-surface-container-highest rounded-2xl"></div>
        <div class="h-12 bg-surface-container-highest rounded-2xl"></div>
        <div class="h-12 bg-surface-container-highest rounded-2xl"></div>
        <div class="h-12 bg-surface-container-highest rounded-2xl"></div>
      </div>
    </div>
  </main>

  <!-- Bottom Nav -->
  <nav class="fixed bottom-0 left-0 right-0 bg-surface-container-lowest border-t border-outline-variant z-50">
    <div class="flex justify-around items-center h-16 max-w-2xl mx-auto">
      <a href="index.html" class="flex flex-col items-center gap-0.5 px-3 py-2 rounded-xl text-on-surface-variant hover:bg-surface-container transition-colors">
        <span class="material-symbols-outlined" style="font-size:22px">home</span>
        <span class="text-[10px] font-medium">Home</span>
      </a>
      <a href="predict.html" class="flex flex-col items-center gap-0.5 px-3 py-2 rounded-xl text-on-surface-variant hover:bg-surface-container transition-colors">
        <span class="material-symbols-outlined" style="font-size:22px">sports_soccer</span>
        <span class="text-[10px] font-medium">Voorspellen</span>
      </a>
      <a href="ranking.html" class="flex flex-col items-center gap-0.5 px-3 py-2 rounded-xl nav-active">
        <span class="material-symbols-outlined" style="font-size:22px">leaderboard</span>
        <span class="text-[10px] font-medium">Ranglijst</span>
      </a>
      <a href="spelregels.html" class="flex flex-col items-center gap-0.5 px-3 py-2 rounded-xl text-on-surface-variant hover:bg-surface-container transition-colors">
        <span class="material-symbols-outlined" style="font-size:22px">gavel</span>
        <span class="text-[10px] font-medium">Spelregels</span>
      </a>
    </div>
  </nav>

  <script>
    const API_BASE = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
      ? 'http://localhost:3003/api/v1'
      : `${window.location.protocol}//${window.location.host}/api/v1`;

    if (!localStorage.getItem('wk_token')) window.location.href = 'login.html';

    let myUserId = null;
    try {
      const u = JSON.parse(localStorage.getItem('wk_user') || 'null');
      if (u) myUserId = u.id;
    } catch {}

    const openDropdowns = new Set();
    const loadedDropdowns = new Map();

    async function apiFetch(path, opts = {}) {
      const token = localStorage.getItem('wk_token');
      const res = await fetch(API_BASE + path, {
        ...opts,
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}`, ...(opts.headers || {}) },
      });
      if (res.status === 401) { ['wk_token','wk_refresh_token','wk_user'].forEach(k => localStorage.removeItem(k)); window.location.href = 'login.html'; }
      return res;
    }

    function initials(first, last) {
      return `${(first||'?')[0]}${(last||'')[0] || ''}`.toUpperCase();
    }

    function avatarColor(pos) {
      const colors = ['#4700b0','#006874','#a80b1d','#d97706','#059669','#7c3aed','#db2777','#0369a1'];
      return colors[pos % colors.length];
    }

    const PHASE_LABELS = {
      group: 'Groepsfase',
      round_of_32: 'Ronde van 32',
      round_of_16: 'Achtste finales',
      quarter_final: 'Kwartfinales',
      semi_final: 'Halve finales',
      third_place: '3e Plaats',
      final: 'Finale',
    };

    function ptsBadge(points) {
      if (points === null || points === undefined) {
        return `<span class="text-[10px] px-1.5 py-0.5 rounded-full bg-surface-container text-on-surface-variant font-medium">—</span>`;
      }
      const cfg = points >= 10 ? 'bg-emerald-100 text-emerald-700'
        : points >= 7 ? 'bg-teal-100 text-teal-700'
        : points >= 5 ? 'bg-blue-100 text-blue-700'
        : points >= 3 ? 'bg-violet-100 text-violet-700'
        : points >= 1 ? 'bg-amber-100 text-amber-700'
        : 'bg-red-100 text-red-600';
      return `<span class="text-[10px] px-1.5 py-0.5 rounded-full font-bold ${cfg}">${points}pt</span>`;
    }

    function predRow(p) {
      const m = p.match;
      const homeLabel = m.homeTeam ? `${m.homeTeam.flagEmoji} ${m.homeTeam.name}` : (m.homeTeamPlaceholder || '?');
      const awayLabel = m.awayTeam ? `${m.awayTeam.flagEmoji} ${m.awayTeam.name}` : (m.awayTeamPlaceholder || '?');
      const actual = (m.homeScore !== null && m.homeScore !== undefined) ? `${m.homeScore}–${m.awayScore}` : null;
      const revised = p.isRevised ? `<span class="text-[9px] text-amber-600 font-semibold ml-0.5">½</span>` : '';
      return `
        <div class="flex items-center gap-2 py-1.5 border-b border-outline-variant/40 last:border-0">
          <div class="flex-1 min-w-0">
            <div class="text-xs font-medium text-on-surface leading-tight truncate">${homeLabel}</div>
            <div class="text-xs text-on-surface-variant leading-tight truncate">${awayLabel}</div>
          </div>
          <div class="flex-shrink-0 flex items-center gap-2">
            <div class="text-center">
              <div class="text-[10px] text-on-surface-variant leading-none mb-0.5">voorsp.</div>
              <div class="text-xs font-bold text-on-surface">${p.homeScore}–${p.awayScore}${revised}</div>
            </div>
            ${actual !== null ? `
            <div class="text-center">
              <div class="text-[10px] text-on-surface-variant leading-none mb-0.5">uitslag</div>
              <div class="text-xs font-semibold text-on-surface">${actual}</div>
            </div>` : ''}
            ${ptsBadge(p.points)}
          </div>
        </div>`;
    }

    function renderDropdownContent(preds) {
      if (!preds.length) {
        return `<div class="px-4 py-4 text-xs text-on-surface-variant text-center">Nog geen voorspellingen ingevoerd</div>`;
      }

      // Split by phase, then group-phase by subgroup
      const phaseOrder = ['group','round_of_32','round_of_16','quarter_final','semi_final','third_place','final'];
      const byPhase = {};
      for (const p of preds) {
        const ph = p.match.phase;
        if (!byPhase[ph]) byPhase[ph] = [];
        byPhase[ph].push(p);
      }

      return phaseOrder.filter(ph => byPhase[ph]).map(ph => {
        const items = byPhase[ph];
        if (ph === 'group') {
          const byGroup = {};
          for (const p of items) {
            const g = p.match.group || '?';
            if (!byGroup[g]) byGroup[g] = [];
            byGroup[g].push(p);
          }
          return Object.keys(byGroup).sort().map(g => `
            <div class="px-4 pt-2 pb-1">
              <div class="text-[10px] font-bold tracking-widest text-primary uppercase mb-1">Groep ${g}</div>
              ${byGroup[g].map(predRow).join('')}
            </div>`).join('');
        }
        return `
          <div class="px-4 pt-2 pb-1">
            <div class="text-[10px] font-bold tracking-widest text-primary uppercase mb-1">${PHASE_LABELS[ph] || ph}</div>
            ${items.map(predRow).join('')}
          </div>`;
      }).join('');
    }

    async function toggleDropdown(userId) {
      const panel = document.getElementById(`dp-${userId}`);
      const chevron = document.getElementById(`ch-${userId}`);
      const content = document.getElementById(`dc-${userId}`);
      if (!panel) return;

      if (openDropdowns.has(userId)) {
        panel.classList.remove('open');
        chevron.classList.remove('open');
        openDropdowns.delete(userId);
        return;
      }

      panel.classList.add('open');
      chevron.classList.add('open');
      openDropdowns.add(userId);

      if (loadedDropdowns.has(userId)) {
        content.innerHTML = renderDropdownContent(loadedDropdowns.get(userId));
        return;
      }

      content.innerHTML = `
        <div class="px-4 py-3 flex items-center gap-2 text-xs text-on-surface-variant">
          <div class="w-3 h-3 rounded-full border-2 border-primary border-t-transparent animate-spin"></div>
          Laden…
        </div>`;

      try {
        const res = await apiFetch(`/rankings/${userId}/predictions`);
        if (!res.ok) throw new Error();
        const preds = await res.json();
        loadedDropdowns.set(userId, preds);
        if (openDropdowns.has(userId)) content.innerHTML = renderDropdownContent(preds);
      } catch {
        content.innerHTML = `<div class="px-4 py-3 text-xs text-red-500">Kon voorspellingen niet laden</div>`;
      }
    }

    function renderPodium(top3) {
      const medals = ['🥇', '🥈', '🥉'];
      const medalColors = [
        'from-amber-400 to-yellow-300 shadow-amber-200',
        'from-slate-400 to-gray-300 shadow-slate-200',
        'from-orange-500 to-amber-400 shadow-orange-200',
      ];
      const heights = ['h-24', 'h-16', 'h-12'];
      const order = [top3[1], top3[0], top3[2]].filter(Boolean);
      const orderIdxs = [1, 0, 2];

      return `
        <div class="bg-surface-container-lowest rounded-2xl px-4 pt-6 pb-0 shadow-[0_2px_8px_rgba(71,0,176,0.06)] mb-4 overflow-hidden">
          <div class="text-xs font-bold tracking-widest text-on-surface-variant uppercase mb-4 text-center">Podium</div>
          <div class="flex items-end gap-2">
            ${order.map((player, i) => {
              const oi = orderIdxs[i];
              const isMe = player.userId === myUserId;
              return `
                <div class="flex flex-col items-center gap-2 flex-1">
                  <div class="relative">
                    <div class="w-14 h-14 rounded-2xl flex items-center justify-center text-white font-black text-lg shadow-lg ${isMe ? 'ring-4 ring-primary ring-offset-2' : ''}"
                      style="background: ${avatarColor(player.position - 1)}">
                      ${initials(player.firstName, player.lastName)}
                    </div>
                    ${isMe ? `<div class="absolute -top-1 -right-1 w-5 h-5 bg-primary rounded-full flex items-center justify-center text-white" style="font-size:10px">✓</div>` : ''}
                  </div>
                  <div class="text-xs font-bold text-on-surface text-center leading-tight max-w-[80px] truncate">${player.firstName} ${player.lastName}</div>
                  <div class="text-lg font-black ${oi === 0 ? 'text-amber-500' : oi === 1 ? 'text-slate-500' : 'text-orange-500'}">${medals[oi]}</div>
                  <div class="w-full bg-gradient-to-t ${medalColors[oi]} rounded-t-2xl ${heights[i]} flex items-start justify-center pt-2">
                    <span class="text-white font-black text-sm">${player.totalPoints}pt</span>
                  </div>
                </div>`;
            }).join('')}
          </div>
        </div>`;
    }

    function renderTable(players, noPointsYet) {
      const rows = players.map((p, i) => {
        const isMe = p.userId === myUserId;
        const rowClass = !noPointsYet && i === 0 ? 'gold'
          : !noPointsYet && i === 1 ? 'silver'
          : !noPointsYet && i === 2 ? 'bronze'
          : isMe ? 'my-row' : '';
        const medal = !noPointsYet ? (i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : '') : '';
        const posLabel = medal || `<span class="text-sm font-bold text-on-surface-variant">${noPointsYet ? '·' : p.position}</span>`;

        return `
          <div id="row-${p.userId}">
            <div class="flex items-center gap-3 px-4 py-3 rounded-xl cursor-pointer select-none hover:bg-surface-container/60 transition-colors ${rowClass} ${isMe ? 'ring-1 ring-primary/20' : ''}"
              onclick="toggleDropdown('${p.userId}')">
              <div class="w-7 text-center flex-shrink-0">${posLabel}</div>
              <div class="w-9 h-9 rounded-xl flex items-center justify-center text-white text-xs font-black flex-shrink-0"
                style="background: ${avatarColor(i)}">
                ${initials(p.firstName, p.lastName)}
              </div>
              <div class="flex-1 min-w-0">
                <div class="font-semibold text-sm text-on-surface truncate">${p.firstName} ${p.lastName}${isMe ? ' <span class="text-primary text-[10px] font-bold">(jij)</span>' : ''}</div>
                <div class="text-xs text-on-surface-variant">
                  ${noPointsYet
                    ? 'Klik om voorspellingen te bekijken'
                    : `${p.exactCount}× exact · ${p.settledCount} gesettled${p.bonusPoints > 0 ? ` · <span class="text-amber-600 font-semibold">+${p.bonusPoints} bonus</span>` : ''}`}
                </div>
              </div>
              <div class="flex items-center gap-2 flex-shrink-0">
                ${noPointsYet ? '' : `
                <div class="text-right">
                  <div class="font-black text-lg text-primary leading-none">${p.totalPoints}</div>
                  <div class="text-[10px] text-on-surface-variant">punten</div>
                </div>`}
                <span id="ch-${p.userId}" class="material-symbols-outlined text-on-surface-variant chevron" style="font-size:18px">expand_more</span>
              </div>
            </div>
            <div id="dp-${p.userId}" class="dropdown-panel">
              <div id="dc-${p.userId}" class="bg-surface-container-low rounded-xl mx-2 mb-2 overflow-hidden"></div>
            </div>
          </div>`;
      }).join('');

      const header = noPointsYet
        ? `<div class="flex items-center gap-2 px-4 py-3 border-b border-outline-variant">
             <span class="material-symbols-outlined text-outline" style="font-size:16px">sort_by_alpha</span>
             <div class="text-xs font-bold tracking-widest text-on-surface-variant uppercase">Deelnemers — Alfabetisch</div>
           </div>`
        : `<div class="px-4 py-3 border-b border-outline-variant">
             <div class="text-xs font-bold tracking-widest text-on-surface-variant uppercase">Volledige Ranglijst</div>
           </div>`;

      return `
        <div class="bg-surface-container-lowest rounded-2xl shadow-[0_2px_8px_rgba(71,0,176,0.06)] overflow-hidden">
          ${header}
          <div class="p-2 space-y-0.5">${rows}</div>
        </div>`;
    }

    async function loadRanking() {
      document.getElementById('ranking-content').innerHTML = `
        <div class="space-y-3 animate-pulse">
          <div class="h-36 bg-surface-container-highest rounded-2xl"></div>
          <div class="h-12 bg-surface-container-highest rounded-2xl"></div>
          <div class="h-12 bg-surface-container-highest rounded-2xl"></div>
          <div class="h-12 bg-surface-container-highest rounded-2xl"></div>
        </div>`;
      openDropdowns.clear();
      loadedDropdowns.clear();

      try {
        const res = await apiFetch('/rankings');
        if (!res.ok) throw new Error('Laden mislukt');
        const players = await res.json();
        const noPointsYet = players.length === 0 || players.every(p => p.totalPoints === 0);

        let html = '';

        const myEntry = players.find(p => p.userId === myUserId);
        if (!noPointsYet && myEntry && myEntry.position > 3) {
          html += `
            <div class="flex items-center justify-between bg-primary/10 border border-primary/20 rounded-xl px-4 py-3 mb-4">
              <div class="flex items-center gap-2">
                <span class="material-symbols-outlined ms-filled text-primary" style="font-size:20px">person</span>
                <span class="text-sm font-semibold text-on-surface">Jouw positie</span>
              </div>
              <div class="flex items-center gap-3">
                <span class="text-sm font-bold text-on-surface">#${myEntry.position}</span>
                <span class="text-lg font-black text-primary">${myEntry.totalPoints}pts</span>
                <button onclick="document.getElementById('row-${myEntry.userId}').scrollIntoView({behavior:'smooth',block:'center'})"
                  class="text-xs font-semibold text-primary hover:underline">Toon ↓</button>
              </div>
            </div>`;
        }

        if (!noPointsYet && players.length >= 3) {
          html += renderPodium(players.slice(0, 3));
        }

        if (noPointsYet) {
          html += `
            <div class="bg-surface-container-lowest rounded-2xl px-4 py-4 mb-4 shadow-[0_2px_8px_rgba(71,0,176,0.06)] flex items-start gap-3">
              <span class="material-symbols-outlined ms-filled text-primary mt-0.5" style="font-size:22px">sports_soccer</span>
              <div>
                <div class="text-sm font-bold text-on-surface">WK 2026 begint op 11 juni</div>
                <div class="text-xs text-on-surface-variant mt-0.5">Punten worden berekend na afloop van elke wedstrijd. Klik op een speler om zijn voorspellingen te bekijken.</div>
              </div>
            </div>`;
        }

        html += renderTable(players, noPointsYet);
        document.getElementById('ranking-content').innerHTML = html;
      } catch (err) {
        document.getElementById('ranking-content').innerHTML = `
          <div class="text-center py-12">
            <span class="material-symbols-outlined text-error" style="font-size:40px">error</span>
            <p class="text-on-surface-variant mt-2">Fout bij laden: ${err.message}</p>
            <button onclick="loadRanking()" class="mt-4 text-primary font-semibold text-sm">Opnieuw proberen</button>
          </div>`;
      }
    }

    loadRanking();
  </script>
</body>
</html>
