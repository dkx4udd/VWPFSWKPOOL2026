<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ranglijst — WK Pool 2026</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700;800;900&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 48; }
    .ms-filled { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 48; }
    .host-city-pattern {
      background-image: radial-gradient(circle at 2px 2px, rgba(110, 36, 246, 0.05) 1px, transparent 0);
      background-size: 16px 16px;
    }
    .btn-gradient { background: linear-gradient(135deg, #6200eb, #4700b0); }
    .nav-active .material-symbols-outlined { font-variation-settings: 'FILL' 1, 'wght' 700, 'GRAD' 0, 'opsz' 48; color: #4700b0; }
    .nav-active span:last-child { color: #4700b0; font-weight: 700; }
    .gold { background: linear-gradient(135deg, #f59e0b22, #fde68a33); border-left: 3px solid #f59e0b; }
    .silver { background: linear-gradient(135deg, #9ca3af22, #d1d5db33); border-left: 3px solid #9ca3af; }
    .bronze { background: linear-gradient(135deg, #d9770622, #fed7aa33); border-left: 3px solid #d97706; }
    .my-row { background: #4700b010; border-left: 3px solid #4700b0; }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            "surface-container-lowest": "#ffffff",
            "on-primary": "#ffffff",
            "surface-container-low": "#f3f3f4",
            "on-surface-variant": "#494456",
            "background": "#f9f9f9",
            "primary": "#4700b0",
            "outline-variant": "#cbc3d9",
            "secondary": "#006874",
            "surface-container": "#eeeeee",
            "on-surface": "#1a1c1c",
            "surface-container-high": "#e8e8e8",
            "outline": "#7b7488",
            "surface-container-highest": "#e2e2e2",
          },
          fontFamily: { sans: ["Lexend", "sans-serif"] },
        }
      }
    }
  </script>
</head>
<body class="bg-background text-on-surface font-sans min-h-screen host-city-pattern">

  <!-- Header -->
  <header class="flex justify-between items-center px-4 h-16 w-full z-50 bg-surface-container-lowest border-b border-outline-variant sticky top-0">
    <div class="flex items-center gap-2">
      <div class="bg-primary p-2 rounded-lg text-white">
        <span class="material-symbols-outlined ms-filled" style="font-size:22px">leaderboard</span>
      </div>
      <div>
        <div class="text-[9px] font-bold tracking-[0.2em] text-primary uppercase">Klassement</div>
        <div class="text-base font-black text-on-surface leading-none">Ranglijst</div>
      </div>
    </div>
    <button onclick="loadRanking()" class="flex items-center gap-1 text-xs font-semibold text-primary px-3 py-2 rounded-xl hover:bg-surface-container transition-colors">
      <span class="material-symbols-outlined" style="font-size:18px">refresh</span>
    </button>
  </header>

  <!-- Main -->
  <main class="px-4 pt-4 pb-24 max-w-2xl mx-auto">
    <div id="ranking-content">
      <!-- Skeleton -->
      <div class="space-y-3 animate-pulse">
        <div class="h-36 bg-surface-container-highest rounded-2xl"></div>
        <div class="h-12 bg-surface-container-highest rounded-2xl"></div>
        <div class="h-12 bg-surface-container-highest rounded-2xl"></div>
        <div class="h-12 bg-surface-container-highest rounded-2xl"></div>
        <div class="h-12 bg-surface-container-highest rounded-2xl"></div>
        <div class="h-12 bg-surface-container-highest rounded-2xl"></div>
      </div>
    </div>
  </main>

  <!-- Bottom Nav -->
  <nav class="fixed bottom-0 left-0 right-0 bg-surface-container-lowest border-t border-outline-variant z-50">
    <div class="flex justify-around items-center h-16 max-w-2xl mx-auto">
      <a href="index.html" class="flex flex-col items-center gap-0.5 px-4 py-2 rounded-xl text-on-surface-variant hover:bg-surface-container transition-colors">
        <span class="material-symbols-outlined" style="font-size:24px">home</span>
        <span class="text-[11px] font-medium">Home</span>
      </a>
      <a href="predict.html" class="flex flex-col items-center gap-0.5 px-4 py-2 rounded-xl text-on-surface-variant hover:bg-surface-container transition-colors">
        <span class="material-symbols-outlined" style="font-size:24px">sports_soccer</span>
        <span class="text-[11px] font-medium">Voorspellen</span>
      </a>
      <a href="ranking.html" class="flex flex-col items-center gap-0.5 px-4 py-2 rounded-xl nav-active">
        <span class="material-symbols-outlined" style="font-size:24px">leaderboard</span>
        <span class="text-[11px] font-medium">Ranglijst</span>
      </a>
    </div>
  </nav>

  <script>
    const API_BASE = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
      ? 'http://localhost:3003/api/v1'
      : `${window.location.protocol}//${window.location.host}/api/v1`;

    if (!localStorage.getItem('wk_token')) window.location.href = 'login.html';

    let myUserId = null;
    try {
      const u = JSON.parse(localStorage.getItem('wk_user') || 'null');
      if (u) myUserId = u.id;
    } catch {}

    async function apiFetch(path, opts = {}) {
      const token = localStorage.getItem('wk_token');
      const res = await fetch(API_BASE + path, {
        ...opts,
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}`, ...(opts.headers || {}) },
      });
      if (res.status === 401) { ['wk_token','wk_refresh_token','wk_user'].forEach(k => localStorage.removeItem(k)); window.location.href = 'login.html'; }
      return res;
    }

    function initials(first, last) {
      return `${(first||'?')[0]}${(last||'')[0] || ''}`.toUpperCase();
    }

    function avatarColor(pos) {
      const colors = ['#4700b0','#006874','#a80b1d','#d97706','#059669','#7c3aed','#db2777','#0369a1'];
      return colors[pos % colors.length];
    }

    function renderPodium(top3) {
      const medals = ['🥇', '🥈', '🥉'];
      const medalColors = [
        'from-amber-400 to-yellow-300 shadow-amber-200',
        'from-slate-400 to-gray-300 shadow-slate-200',
        'from-orange-500 to-amber-400 shadow-orange-200',
      ];
      const heights = ['h-24', 'h-16', 'h-12'];
      // Podium order: 2nd, 1st, 3rd
      const order = [top3[1], top3[0], top3[2]].filter(Boolean);
      const orderIndexes = [1, 0, 2];

      const podiumHtml = order.map((player, i) => {
        const origIdx = orderIndexes[i];
        const isMe = player.userId === myUserId;
        return `
          <div class="flex flex-col items-center gap-2 flex-1">
            <div class="relative">
              <div class="w-14 h-14 rounded-2xl flex items-center justify-center text-white font-black text-lg shadow-lg ${isMe ? 'ring-4 ring-primary ring-offset-2' : ''}"
                style="background: ${avatarColor(player.position - 1)}">
                ${initials(player.firstName, player.lastName)}
              </div>
              ${isMe ? `<div class="absolute -top-1 -right-1 w-5 h-5 bg-primary rounded-full flex items-center justify-center text-white" style="font-size:10px">✓</div>` : ''}
            </div>
            <div class="text-xs font-bold text-on-surface text-center leading-tight max-w-[80px] truncate">${player.firstName} ${player.lastName}</div>
            <div class="text-lg font-black ${origIdx === 0 ? 'text-amber-500' : origIdx === 1 ? 'text-slate-500' : 'text-orange-500'}">${medals[origIdx]}</div>
            <div class="w-full bg-gradient-to-t ${medalColors[origIdx]} rounded-t-2xl ${heights[i]} flex items-start justify-center pt-2">
              <span class="text-white font-black text-sm">${player.totalPoints}pt</span>
            </div>
          </div>`;
      }).join('');

      return `
        <div class="bg-surface-container-lowest rounded-2xl px-4 pt-6 pb-0 shadow-[0_2px_8px_rgba(71,0,176,0.06)] mb-4 overflow-hidden">
          <div class="text-xs font-bold tracking-widest text-on-surface-variant uppercase mb-4 text-center">Podium</div>
          <div class="flex items-end gap-2">${podiumHtml}</div>
        </div>`;
    }

    function renderTable(players) {
      if (players.length === 0) {
        return `
          <div class="bg-surface-container-lowest rounded-2xl p-8 text-center shadow-[0_2px_8px_rgba(71,0,176,0.06)]">
            <span class="material-symbols-outlined text-outline" style="font-size:48px">leaderboard</span>
            <p class="text-on-surface-variant mt-3 font-medium">Nog geen punten gescoord</p>
            <p class="text-sm text-on-surface-variant mt-1">Scores worden berekend na afloop van elke wedstrijd.</p>
          </div>`;
      }

      const rows = players.map((p, i) => {
        const isMe = p.userId === myUserId;
        const rowClass = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : isMe ? 'my-row' : '';
        const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : '';
        return `
          <div id="row-${p.userId}" class="flex items-center gap-3 px-4 py-3 rounded-xl ${rowClass} ${isMe ? 'ring-1 ring-primary/20' : ''}">
            <div class="w-8 text-center">
              ${medal || `<span class="text-sm font-bold text-on-surface-variant">${p.position}</span>`}
            </div>
            <div class="w-9 h-9 rounded-xl flex items-center justify-center text-white text-xs font-black flex-shrink-0"
              style="background: ${avatarColor(i)}">
              ${initials(p.firstName, p.lastName)}
            </div>
            <div class="flex-1 min-w-0">
              <div class="font-semibold text-sm text-on-surface truncate">${p.firstName} ${p.lastName}${isMe ? ' <span class="text-primary text-[10px] font-bold">(jij)</span>' : ''}</div>
              <div class="text-xs text-on-surface-variant">${p.exactCount} exact · ${p.settledCount} gesettled</div>
            </div>
            <div class="text-right flex-shrink-0">
              <div class="font-black text-lg text-primary leading-none">${p.totalPoints}</div>
              <div class="text-[10px] text-on-surface-variant">punten</div>
            </div>
          </div>`;
      }).join('');

      return `
        <div class="bg-surface-container-lowest rounded-2xl shadow-[0_2px_8px_rgba(71,0,176,0.06)] overflow-hidden">
          <div class="px-4 py-3 border-b border-outline-variant">
            <div class="text-xs font-bold tracking-widest text-on-surface-variant uppercase">Volledige Ranglijst</div>
          </div>
          <div class="p-3 space-y-1.5">${rows}</div>
        </div>`;
    }

    async function loadRanking() {
      document.getElementById('ranking-content').innerHTML = `
        <div class="space-y-3 animate-pulse">
          <div class="h-36 bg-surface-container-highest rounded-2xl"></div>
          <div class="h-12 bg-surface-container-highest rounded-2xl"></div>
          <div class="h-12 bg-surface-container-highest rounded-2xl"></div>
          <div class="h-12 bg-surface-container-highest rounded-2xl"></div>
        </div>`;

      try {
        const res = await apiFetch('/rankings');
        if (!res.ok) throw new Error('Laden mislukt');
        const players = await res.json();

        let html = '';

        // My rank sticky banner if I'm not in top 3
        const myEntry = players.find(p => p.userId === myUserId);
        if (myEntry && myEntry.position > 3) {
          html += `
            <div class="flex items-center justify-between bg-primary/10 border border-primary/20 rounded-xl px-4 py-3 mb-4">
              <div class="flex items-center gap-2">
                <span class="material-symbols-outlined ms-filled text-primary" style="font-size:20px">person</span>
                <span class="text-sm font-semibold text-on-surface">Jouw positie</span>
              </div>
              <div class="flex items-center gap-3">
                <span class="text-sm font-bold text-on-surface">#${myEntry.position}</span>
                <span class="text-lg font-black text-primary">${myEntry.totalPoints}pts</span>
                <button onclick="document.getElementById('row-${myEntry.userId}').scrollIntoView({behavior:'smooth',block:'center'})"
                  class="text-xs font-semibold text-primary hover:underline">Toon ↓</button>
              </div>
            </div>`;
        }

        if (players.length >= 3) {
          html += renderPodium(players.slice(0, 3));
        }

        html += renderTable(players);

        document.getElementById('ranking-content').innerHTML = html;
      } catch (err) {
        document.getElementById('ranking-content').innerHTML = `
          <div class="text-center py-12">
            <span class="material-symbols-outlined text-error" style="font-size:40px">error</span>
            <p class="text-on-surface-variant mt-2">Fout bij laden: ${err.message}</p>
            <button onclick="loadRanking()" class="mt-4 text-primary font-semibold text-sm">Opnieuw proberen</button>
          </div>`;
      }
    }

    loadRanking();
  </script>
</body>
</html>
