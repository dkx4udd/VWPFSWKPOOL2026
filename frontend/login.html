<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inloggen — WK Pool 2026</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700;800;900&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 48; }
    .host-city-pattern {
      background-image: radial-gradient(circle at 2px 2px, rgba(110, 36, 246, 0.05) 1px, transparent 0);
      background-size: 16px 16px;
    }
    .input-glow:focus { box-shadow: 0 0 0 4px rgba(71, 0, 176, 0.1); }
    .btn-gradient { background: linear-gradient(135deg, #6200eb, #4700b0); }
    .btn-gradient:hover { background: linear-gradient(135deg, #5400cc, #3d0094); }
    .btn-gradient:disabled { background: #e2e2e2; box-shadow: none; color: #7b7488; cursor: not-allowed; }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            "surface-container-lowest": "#ffffff",
            "secondary-container": "#5ce9fe",
            "error": "#ba1a1a",
            "on-primary": "#ffffff",
            "surface-container-low": "#f3f3f4",
            "on-surface-variant": "#494456",
            "background": "#f9f9f9",
            "primary": "#4700b0",
            "outline-variant": "#cbc3d9",
            "primary-container": "#6200eb",
            "secondary": "#006874",
            "surface-container": "#eeeeee",
            "on-surface": "#1a1c1c",
            "surface-container-high": "#e8e8e8",
            "surface": "#f9f9f9",
            "outline": "#7b7488",
            "surface-container-highest": "#e2e2e2",
            "secondary-fixed-dim": "#45d8ed"
          },
          borderRadius: { DEFAULT: "0.25rem", lg: "0.5rem", xl: "0.75rem", full: "9999px" },
          spacing: {
            "margin-desktop": "64px", sm: "12px", md: "24px", lg: "48px",
            gutter: "24px", xs: "4px", "margin-mobile": "16px", xl: "80px", base: "8px"
          },
          fontFamily: { sans: ["Lexend", "sans-serif"] },
          fontSize: {
            "headline-md": ["24px", { lineHeight: "1.3", fontWeight: "600" }],
            "body-md": ["16px", { lineHeight: "1.5", fontWeight: "400" }],
            "headline-lg": ["32px", { lineHeight: "1.2", fontWeight: "700" }],
            "label-lg": ["14px", { lineHeight: "1.2", letterSpacing: "0.05em", fontWeight: "600" }],
            "body-lg": ["18px", { lineHeight: "1.6", fontWeight: "400" }],
            "label-sm": ["12px", { lineHeight: "1.2", fontWeight: "500" }],
          }
        }
      }
    }
  </script>
</head>
<body class="bg-background text-on-surface font-sans min-h-screen host-city-pattern flex items-center justify-center p-4">

  <div class="w-full max-w-sm">
    <!-- Logo -->
    <div class="flex items-center gap-3 mb-10 justify-center">
      <div class="bg-primary p-3 rounded-xl text-on-primary shadow-lg">
        <span class="material-symbols-outlined" style="font-size:32px;font-variation-settings:'FILL' 1,'wght' 700,'GRAD' 0,'opsz' 48">sports_soccer</span>
      </div>
      <div class="flex flex-col -space-y-1">
        <span class="text-[10px] font-bold tracking-[0.2em] text-primary uppercase">FIFA World Cup</span>
        <span class="text-[28px] font-black text-on-surface tracking-tight leading-none">2026™</span>
      </div>
    </div>

    <!-- Card -->
    <div class="bg-surface-container-lowest rounded-2xl shadow-[0_4px_24px_rgba(71,0,176,0.08),0_1px_4px_rgba(0,0,0,0.06)] overflow-hidden">
      <!-- Tabs -->
      <div class="flex border-b border-outline-variant">
        <button id="tab-login" onclick="showTab('login')"
          class="flex-1 py-4 text-sm font-semibold text-primary border-b-2 border-primary transition-all">
          Inloggen
        </button>
        <button id="tab-register" onclick="showTab('register')"
          class="flex-1 py-4 text-sm font-semibold text-on-surface-variant border-b-2 border-transparent transition-all">
          Registreren
        </button>
      </div>

      <!-- Login Form -->
      <div id="form-login" class="p-6">
        <div id="login-error" class="hidden mb-4 p-3 bg-[#ffdad6] text-error rounded-xl text-sm font-medium"></div>
        <form onsubmit="handleLogin(event)" class="space-y-4">
          <div>
            <label class="text-xs font-semibold tracking-widest text-on-surface-variant uppercase block mb-1">E-mailadres</label>
            <input id="login-email" type="email" required autocomplete="email"
              class="w-full bg-surface-container-low border border-outline-variant rounded-xl px-4 py-3 text-on-surface placeholder:text-outline focus:outline-none focus:border-primary input-glow transition-all"
              placeholder="naam@email.nl">
          </div>
          <div>
            <label class="text-xs font-semibold tracking-widest text-on-surface-variant uppercase block mb-1">Wachtwoord</label>
            <div class="relative">
              <input id="login-password" type="password" required autocomplete="current-password"
                class="w-full bg-surface-container-low border border-outline-variant rounded-xl px-4 py-3 pr-12 text-on-surface placeholder:text-outline focus:outline-none focus:border-primary input-glow transition-all"
                placeholder="••••••••">
              <button type="button" onclick="togglePw('login-password', this)"
                class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors p-1">
                <span class="material-symbols-outlined" style="font-size:20px">visibility</span>
              </button>
            </div>
          </div>
          <button type="submit" id="login-btn"
            class="w-full btn-gradient text-white font-bold py-4 rounded-xl transition-all active:scale-[0.98] shadow-[0_4px_12px_rgba(71,0,176,0.3)] mt-2">
            <span id="login-btn-text">Inloggen</span>
          </button>
        </form>
      </div>

      <!-- Register Form -->
      <div id="form-register" class="p-6 hidden">
        <div id="register-error" class="hidden mb-4 p-3 bg-[#ffdad6] text-error rounded-xl text-sm font-medium"></div>
        <form onsubmit="handleRegister(event)" class="space-y-4">
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="text-xs font-semibold tracking-widest text-on-surface-variant uppercase block mb-1">Voornaam</label>
              <input id="reg-firstname" type="text" required autocomplete="given-name"
                class="w-full bg-surface-container-low border border-outline-variant rounded-xl px-4 py-3 text-on-surface placeholder:text-outline focus:outline-none focus:border-primary input-glow transition-all"
                placeholder="Jan">
            </div>
            <div>
              <label class="text-xs font-semibold tracking-widest text-on-surface-variant uppercase block mb-1">Achternaam</label>
              <input id="reg-lastname" type="text" required autocomplete="family-name"
                class="w-full bg-surface-container-low border border-outline-variant rounded-xl px-4 py-3 text-on-surface placeholder:text-outline focus:outline-none focus:border-primary input-glow transition-all"
                placeholder="Jansen">
            </div>
          </div>
          <div>
            <label class="text-xs font-semibold tracking-widest text-on-surface-variant uppercase block mb-1">E-mailadres</label>
            <input id="reg-email" type="email" required autocomplete="email"
              class="w-full bg-surface-container-low border border-outline-variant rounded-xl px-4 py-3 text-on-surface placeholder:text-outline focus:outline-none focus:border-primary input-glow transition-all"
              placeholder="naam@email.nl">
          </div>
          <div>
            <label class="text-xs font-semibold tracking-widest text-on-surface-variant uppercase block mb-1">Wachtwoord</label>
            <div class="relative">
              <input id="reg-password" type="password" required autocomplete="new-password" minlength="8"
                class="w-full bg-surface-container-low border border-outline-variant rounded-xl px-4 py-3 pr-12 text-on-surface placeholder:text-outline focus:outline-none focus:border-primary input-glow transition-all"
                placeholder="Min. 8 tekens">
              <button type="button" onclick="togglePw('reg-password', this)"
                class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors p-1">
                <span class="material-symbols-outlined" style="font-size:20px">visibility</span>
              </button>
            </div>
          </div>
          <button type="submit" id="register-btn"
            class="w-full btn-gradient text-white font-bold py-4 rounded-xl transition-all active:scale-[0.98] shadow-[0_4px_12px_rgba(71,0,176,0.3)] mt-2">
            <span id="register-btn-text">Account aanmaken</span>
          </button>
        </form>
      </div>
    </div>

    <p class="text-center text-sm text-on-surface-variant mt-6">WK 2026 Pool — VWPFS</p>
  </div>

  <script>
    const API_BASE = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
      ? 'http://localhost:3003/api/v1'
      : `${window.location.protocol}//${window.location.host}/api/v1`;

    if (localStorage.getItem('wk_token')) window.location.href = 'index.html';

    function showTab(tab) {
      const isLogin = tab === 'login';
      document.getElementById('form-login').classList.toggle('hidden', !isLogin);
      document.getElementById('form-register').classList.toggle('hidden', isLogin);
      const active = 'flex-1 py-4 text-sm font-semibold text-primary border-b-2 border-primary transition-all';
      const inactive = 'flex-1 py-4 text-sm font-semibold text-on-surface-variant border-b-2 border-transparent transition-all';
      document.getElementById('tab-login').className = isLogin ? active : inactive;
      document.getElementById('tab-register').className = !isLogin ? active : inactive;
    }

    function togglePw(id, btn) {
      const input = document.getElementById(id);
      const icon = btn.querySelector('.material-symbols-outlined');
      if (input.type === 'password') { input.type = 'text'; icon.textContent = 'visibility_off'; }
      else { input.type = 'password'; icon.textContent = 'visibility'; }
    }

    function showError(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.classList.remove('hidden');
    }

    function setLoading(btnId, textId, loading, defaultText) {
      const btn = document.getElementById(btnId);
      btn.disabled = loading;
      document.getElementById(textId).textContent = loading ? 'Bezig...' : defaultText;
    }

    async function handleLogin(e) {
      e.preventDefault();
      document.getElementById('login-error').classList.add('hidden');
      setLoading('login-btn', 'login-btn-text', true, 'Inloggen');
      try {
        const res = await fetch(`${API_BASE}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('login-email').value.trim(),
            password: document.getElementById('login-password').value,
          }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(Array.isArray(data.message) ? data.message[0] : (data.message || 'Inloggen mislukt'));
        localStorage.setItem('wk_token', data.accessToken);
        localStorage.setItem('wk_refresh_token', data.refreshToken);
        localStorage.setItem('wk_user', JSON.stringify(data.user));
        window.location.href = 'index.html';
      } catch (err) {
        showError('login-error', err.message);
        setLoading('login-btn', 'login-btn-text', false, 'Inloggen');
      }
    }

    async function handleRegister(e) {
      e.preventDefault();
      document.getElementById('register-error').classList.add('hidden');
      setLoading('register-btn', 'register-btn-text', true, 'Account aanmaken');
      try {
        const res = await fetch(`${API_BASE}/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            firstName: document.getElementById('reg-firstname').value.trim(),
            lastName: document.getElementById('reg-lastname').value.trim(),
            email: document.getElementById('reg-email').value.trim(),
            password: document.getElementById('reg-password').value,
          }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(Array.isArray(data.message) ? data.message[0] : (data.message || 'Registreren mislukt'));
        localStorage.setItem('wk_token', data.accessToken);
        localStorage.setItem('wk_refresh_token', data.refreshToken);
        localStorage.setItem('wk_user', JSON.stringify(data.user));
        window.location.href = 'index.html';
      } catch (err) {
        showError('register-error', err.message);
        setLoading('register-btn', 'register-btn-text', false, 'Account aanmaken');
      }
    }
  </script>
</body>
</html>
